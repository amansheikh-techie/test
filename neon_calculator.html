<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Calculator</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(45deg, #0d0d0d, #1a1a1a);
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
        }

        /* animated gradient */
        @keyframes bgAnim {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        body {
            background: linear-gradient(45deg, #0d0d0d, #1a1a1a, #0d0d0d);
            background-size: 400% 400%;
            animation: bgAnim 15s ease infinite;
        }

        .calculator {
            width: 340px;
            padding: 20px;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3), 0 0 40px rgba(255, 0, 255, 0.2);
        }

        .display {
            height: 80px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 20px;
            font-size: 2.5rem;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
            overflow-x: auto;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            width: 70px;
            height: 70px;
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            color: #fff;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.6);
        }

        button:active {
            transform: scale(0.95);
        }

        button:hover {
            box-shadow: 0 0 20px currentColor;
        }

        .num {
            color: #00f;
        }

        .operator {
            color: #f0f;
        }

        .equals {
            color: #0f0;
        }

        .clear {
            color: #f00;
        }

        .wide {
            grid-column: span 2;
        }
    </style>
</head>

<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="clear" data-action="clear">C</button>
            <button class="operator" data-action="percent">%</button>
            <button class="operator" data-action="toggleSign">±</button>
            <button class="operator" data-action="divide">÷</button>

            <button class="num" data-num="7">7</button>
            <button class="num" data-num="8">8</button>
            <button class="num" data-num="9">9</button>
            <button class="operator" data-action="multiply">×</button>

            <button class="num" data-num="4">4</button>
            <button class="num" data-num="5">5</button>
            <button class="num" data-num="6">6</button>
            <button class="operator" data-action="subtract">−</button>

            <button class="num" data-num="1">1</button>
            <button class="num" data-num="2">2</button>
            <button class="num" data-num="3">3</button>
            <button class="operator" data-action="add">+</button>

            <button class="num wide" data-num="0">0</button>
            <button class="num" data-action="decimal">.</button>
            <button class="equals" data-action="equals">=</button>
        </div>
    </div>
    <script>
        const displayEl = document.getElementById('display');
        let current = '0';
        let operator = null;
        let previous = null;
        function updateDisplay() { displayEl.textContent = current; }
        function inputNum(num) {
            if (current === '0' || operator === 'equals') { current = num; operator = null; }
            else { if (current.length < 16) current += num; }
        }
        function inputDecimal() { if (!current.includes('.')) current += '.'; }
        function clear() { current = '0'; previous = null; operator = null; }
        function toggleSign() { current = (parseFloat(current) * -1).toString(); }
        function percent() { current = (parseFloat(current) / 100).toString(); }
        let lastOp = null;
        function performOp(nextOp) {
            const inputValue = parseFloat(current);
            if (previous == null) { previous = inputValue; }
            else if (operator && operator !== 'equals') {
                const result = calculate(previous, inputValue, operator);
                previous = result; current = result.toString();
            }
            operator = nextOp;
            lastOp = nextOp;
            current = '0';
        }
        function calculate(a, b, op) {
            switch (op) {
                case 'add': return a + b;
                case 'subtract': return a - b;
                case 'multiply': return a * b;
                case 'divide': return a / b;
            }
            return b;
        }
        function handleEquals() {
            const inputValue = parseFloat(current);
            if (operator && previous != null) {
                const result = calculate(previous, inputValue, operator);
                current = result.toString();
                previous = null;
                operator = 'equals';
            } else if (operator === 'equals' && lastOp && previous != null) {
                // repeat last operation using current as inputValue
                const result = calculate(previous, inputValue, lastOp);
                current = result.toString();
            }
        }
        document.querySelector('.buttons').addEventListener('click', (e) => {
            const target = e.target; if (!target.matches('button')) return;
            if (target.dataset.num !== undefined) inputNum(target.dataset.num);
            else if (target.dataset.action) {
                const action = target.dataset.action;
                if (action === 'decimal') inputDecimal();
                else if (action === 'clear') clear();
                else if (action === 'toggleSign') toggleSign();
                else if (action === 'percent') percent();
                else if (action === 'equals') handleEquals();
                else performOp(action);
            }
            updateDisplay();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') inputNum(e.key);
            else if (e.key === '.') inputDecimal();
            else if (e.key === 'Enter' || e.key === '=') handleEquals();
            else if (e.key === 'Escape') clear();
            else if (e.key === '%') percent();
            else {
                const ops = { '+': 'add', '-': 'subtract', '*': 'multiply', '/': 'divide' };
                if (ops[e.key]) performOp(ops[e.key]);
            }
            updateDisplay();
        });
        updateDisplay();
    </script>
</body>

</html>
